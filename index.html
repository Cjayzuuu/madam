<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Do You Love Me Madam? ❤️</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>💖 Do You Love Me Madam? 💖</h1>

      <div class="big-heart">❤️</div>

        <button id="noBtn">No 😢</button>

      <div id="message"></div>
    </div>

    <!-- Final Love Screen -->
    <div id="loveScreen">
      <h1 class="loveText">You're the most amazing person I've ever met!</h1>
      <h2 class="loveText">I LOVEEEE YOUUUU MADAM ❤️</h2>
    </div>

    <!-- Music -->
    <audio id="bgMusic" loop>
      <source src="STAR.mp3" type="audio/mpeg" />
    </audio>

    <script src="script.js"></script>
  </body>
</html>
